<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">TalentLens logo</title>
  <desc id="desc">A professional TalentLens wordmark with a lens-and-signal icon.</desc>
  <defs>
    <linearGradient id="markGradient" x1="90" y1="70" x2="260" y2="265" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18B6A7"/>
      <stop offset="1" stop-color="#5B3DF2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="#FFFFFF"/>

  <g transform="translate(74 54)" filter="url(#softShadow)">
    <rect x="0" y="0" width="252" height="252" rx="56" fill="#101827"/>
    <circle cx="115" cy="115" r="70" fill="none" stroke="url(#markGradient)" stroke-width="22"/>
    <path d="M164 164 L216 216" stroke="#18B6A7" stroke-width="24" stroke-linecap="round"/>
    <path d="M70 118 C88 93, 113 80, 146 80" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.94"/>
    <path d="M84 159 H126 M84 132 H158 M84 105 H132" stroke="#C8F7F0" stroke-width="10" stroke-linecap="round" opacity="0.92"/>
    <circle cx="184" cy="80" r="8" fill="#F5B544"/>
    <circle cx="202" cy="102" r="6" fill="#F5B544"/>
    <circle cx="178" cy="111" r="5" fill="#F5B544"/>
  </g>

  <g transform="translate(380 108)">
    <text x="0" y="74" font-family="Aptos Display, Segoe UI, Arial, sans-serif" font-size="86" font-weight="750" fill="#121A2A" letter-spacing="0">TalentLens</text>
    <text x="4" y="128" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#536073" letter-spacing="1.8">OFFLINE CANDIDATE SIGNAL ENGINE</text>
    <rect x="4" y="158" width="92" height="8" rx="4" fill="#18B6A7"/>
    <rect x="108" y="158" width="56" height="8" rx="4" fill="#F5B544"/>
    <rect x="176" y="158" width="112" height="8" rx="4" fill="#5B3DF2"/>
  </g>
</svg>
