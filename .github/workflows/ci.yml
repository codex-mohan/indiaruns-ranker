name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests when challenge data is available
        run: |
          if [ -f ../data/India_runs_data_and_ai_challenge/candidates.jsonl ]; then
            python -m pytest -q tests/test_submission_and_artifacts.py
          else
            echo "Challenge data not present; skipping data-dependent tests."
          fi

      - name: Validate committed submission CSV when validator is available
        run: |
          if [ -f ../data/India_runs_data_and_ai_challenge/validate_submission.py ]; then
            python ../data/India_runs_data_and_ai_challenge/validate_submission.py ./codexmohan_6487.csv
          else
            echo "Challenge validator not present; skipping CSV validation."
          fi

      - name: Check rank CLI
        run: python -m src.rank --help
