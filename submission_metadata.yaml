ai_usage_summary: |
  Used Claude (opencode) for architecture discussion, code review, and project scaffolding.
  Used GitHub Copilot for autocomplete. No candidate data was fed to any LLM.
  All scoring logic is local, deterministic, and runs without network access.

methodology_summary: |
  Rule-grounded hybrid ranker with five scoring components: semantic embedding
  similarity (all-MiniLM-L6-v2), lexical TF-IDF cosine, trust-weighted skill
  evidence (defeats keyword-stuffers), career-fit scoring (title archetype +
  consulting-only disqualifier), experience band, and location preference.
  A multiplicative behavioral envelope (open-to-work, response rate, recency,
  interview completion) adjusts scores. A honeypot gate filters impossible
  profiles. Reasoning is generated from real candidate fields only with three
  tone tiers (assertive / trade-off-aware / hesitant). Runtime ~4 min on CPU
  for 100K candidates; precompute ~20 min on GPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
